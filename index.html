<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗주차타워 관리</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 15px;
  background: #f4f4f4;
  transition: 0.3s;
}

.dark {
  background: #121212;
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.slot {
  border: 1px solid #ccc;
  padding: 12px;
  border-radius: 10px;
  background: white;
}

.dark .slot {
  background: #1e1e1e;
  border-color: #444;
}

input {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  margin: 5px 5px 10px 0;
  padding: 10px 14px;
  font-size: 15px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.hidden {
  display: none;
}

.section-title {
  font-weight: bold;
  margin: 15px 0 5px 0;
}
</style>
</head>

<body>

<div id="login">
  <h2>비밀번호 입력</h2>
  <input type="password" id="passwordInput">
  <button onclick="checkPassword()">확인</button>
</div>

<div id="main" class="hidden container">

  <h2>주차타워🚗관리</h2>

  <button onclick="toggleTheme()">다크 / 라이트</button>
  <button onclick="resetAll()">전체 초기화</button>
  <button onclick="logout()">잠금</button>

  <div class="section-title">1 ~ 28번</div>
  <div class="grid" id="section1"></div>

  <div class="section-title">
    29 ~ 38번
    <button onclick="toggleSection('section2')">접기/펼치기</button>
  </div>
  <div class="grid hidden" id="section2"></div>

  <div class="section-title">
    39 ~ 48번 (SUV)
    <button onclick="toggleSection('section3')">접기/펼치기</button>
  </div>
  <div class="grid hidden" id="section3"></div>

</div>

<script>
const PASSWORD = "1411";

function checkPassword() {
  const input = document.getElementById("passwordInput").value;
  if (input === PASSWORD) {
    localStorage.setItem("loggedIn", "true");
    showMain();
  } else {
    alert("비밀번호 틀림");
  }
}

function logout() {
  localStorage.removeItem("loggedIn");
  document.getElementById("main").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}

function showMain() {
  document.getElementById("login").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");
}

function generateRange(start, end, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  for (let i = start; i <= end; i++) {
    const div = document.createElement("div");
    div.className = "slot";
    div.innerHTML = `
      <strong>${i}번</strong>
      <input type="text"
             id="slot-${i}"
             oninput="saveSlot(${i})"
             placeholder="차량번호 입력">
    `;
    container.appendChild(div);

    const saved = localStorage.getItem("slot-" + i);
    if (saved) {
      document.getElementById("slot-" + i).value = saved;
    }
  }
}

function saveSlot(i) {
  localStorage.setItem("slot-" + i,
    document.getElementById("slot-" + i).value);
}

function resetAll() {
  if (!confirm("전체 삭제할까요?")) return;
  for (let i = 1; i <= 48; i++) {
    localStorage.removeItem("slot-" + i);
  }
  generateAll();
}

function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark") ? "dark" : "light");
}

function toggleSection(id) {
  const section = document.getElementById(id);
  section.classList.toggle("hidden");

  const isHidden = section.classList.contains("hidden");
  localStorage.setItem(id + "-hidden", isHidden);
}

function restoreSectionState(id) {
  const isHidden = localStorage.getItem(id + "-hidden");
  if (isHidden === null || isHidden === "true") {
    document.getElementById(id).classList.add("hidden");
  } else {
    document.getElementById(id).classList.remove("hidden");
  }
}

function generateAll() {
  generateRange(1, 28, "section1");
  generateRange(29, 38, "section2");
  generateRange(39, 48, "section3");
}

(function init() {

  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
  }

  if (localStorage.getItem("loggedIn") === "true") {
    showMain();
  }

  generateAll();

  restoreSectionState("section2");
  restoreSectionState("section3");

})();
</script>

</body>
</html>
